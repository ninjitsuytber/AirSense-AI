<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSense AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="terminal" class="terminal">
        <div class="scanlines"></div>
        <div class="terminal-content">
            <div id="intro-section"></div>
            <div id="output"></div>
            <div class="input-line">
                <span class="prompt">Visitor@AirSense-AI:~$</span>
                <span class="input-wrapper">
                    <span id="placeholder-text" class="placeholder-text"></span>
                    <span id="input-left"></span><span id="cursor" class="cursor">█</span><span id="input-right"></span>
                    <input type="text" id="command-input" class="command-input" autocomplete="off" spellcheck="false"
                        autofocus>
                </span>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
